name: Telegram Bridge

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up git identity
        run: |
          git config user.name "telegram-bridge-bot"
          git config user.email "actions@github.com"

      - name: Pull new Telegram messages into inbox
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "1802052551"
        run: |
          set -e
          mkdir -p .agent
          STATE_FILE=".agent/telegram_state.json"
          INBOX_FILE=".agent/inbox.json"

          [ -f "$STATE_FILE" ] || echo '{"last_update_id": 0}' > "$STATE_FILE"
          [ -f "$INBOX_FILE" ] || echo '[]' > "$INBOX_FILE"

          LAST_UPDATE_ID=$(jq -r '.last_update_id' "$STATE_FILE")
          OFFSET=$((LAST_UPDATE_ID + 1))

          RESP=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${OFFSET}")

          echo "$RESP" | jq --arg chat_id "$CHAT_ID" '
            [.result[]? | select(.message.chat.id == ($chat_id | tonumber)) | {
              update_id: .update_id,
              text: .message.text,
              date: .message.date
            }]
          ' > /tmp/new_messages.json

          NEW_COUNT=$(jq 'length' /tmp/new_messages.json)
          if [ "$NEW_COUNT" -gt 0 ]; then
            jq -s '.[0] + .[1]' "$INBOX_FILE" /tmp/new_messages.json > /tmp/inbox_merged.json
            mv /tmp/inbox_merged.json "$INBOX_FILE"
            echo "Appended $NEW_COUNT new message(s) to inbox"
          fi

          MAX_UPDATE_ID=$(echo "$RESP" | jq '[.result[]?.update_id] | if length > 0 then max else 0 end')
          if [ "$MAX_UPDATE_ID" -gt "$LAST_UPDATE_ID" ]; then
            jq --argjson id "$MAX_UPDATE_ID" '.last_update_id = $id' "$STATE_FILE" > /tmp/state.json
            mv /tmp/state.json "$STATE_FILE"
          fi

          git add .agent/telegram_state.json .agent/inbox.json
          git diff --staged --quiet || git commit -m "Telegram bridge: sync inbox [skip ci]"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install anthropic SDK
        run: pip install anthropic

      - name: Run the coding agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/agent.py

      - name: Pull latest before flushing outbox
        run: git pull --rebase

      - name: Flush queued replies to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "1802052551"
        run: |
          set -e
          OUTBOX_FILE=".agent/outbox.json"
          [ -f "$OUTBOX_FILE" ] || exit 0

          OUTBOX_COUNT=$(jq 'length' "$OUTBOX_FILE")
          if [ "$OUTBOX_COUNT" -gt 0 ]; then
            jq -c '.[]' "$OUTBOX_FILE" | while read -r msg; do
              TEXT=$(echo "$msg" | jq -r '.text')
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg chat_id "$CHAT_ID" --arg text "$TEXT" '{chat_id: ($chat_id|tonumber), text: $text}')" \
                > /dev/null
            done
            echo '[]' > "$OUTBOX_FILE"
            echo "Sent $OUTBOX_COUNT queued reply/replies"
            git add .agent/outbox.json
            git commit -m "Telegram bridge: flush outbox [skip ci]"
            git push
          fi
